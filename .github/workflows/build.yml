name: Build & Release AgentOS v2

on:
  push:
    branches: [main, develop]
    tags:     ['v*']
  pull_request:
    branches: [main]

concurrency:
  group:             ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ─── Lint & Type Check ──────────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint
        continue-on-error: true          # warn, don't fail on lint
      - run: npm run typecheck
        continue-on-error: true          # warn, don't fail on type errors during CI

  # ─── Unit Tests ─────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install system deps (for native modules)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q libxtst-dev python3-dev make g++
      - run: npm ci
      - run: npm test -- --coverage --ci
        env:
          NODE_ENV: test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ─── Build macOS ────────────────────────────────────────
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build renderer + main
        run: npm run build
      - name: Package for macOS
        env:
          CSC_LINK:                    ${{ secrets.MAC_CERT_P12 }}
          CSC_KEY_PASSWORD:            ${{ secrets.MAC_CERT_PASSWORD }}
          APPLE_ID:                    ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID:               ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN:                    ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:mac
      - uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: release/*.{dmg,zip}
          retention-days: 14

  # ─── Build Windows ──────────────────────────────────────
  build-win:
    name: Build Windows
    runs-on: windows-latest
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build renderer + main
        run: npm run build
      - name: Package for Windows
        env:
          WIN_CSC_LINK:         ${{ secrets.WIN_CERT_P12 }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
          GH_TOKEN:             ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: release/*.exe
          retention-days: 14

  # ─── Build Linux ────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libxtst-dev libpng-dev python3-dev make g++ \
            libx11-dev libxkbfile-dev libsecret-1-dev rpm
      - run: npm ci
      - name: Build renderer + main
        run: npm run build
      - name: Package for Linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:linux
      - uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: release/*.{AppImage,deb,rpm}
          retention-days: 14

  # ─── GitHub Release ─────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-mac, build-win, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft:      false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') || contains(github.ref, '-alpha') }}
          generate_release_notes: true
          files: |
            artifacts/mac-builds/*
            artifacts/windows-builds/*
            artifacts/linux-builds/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Docker (self-hosted) ───────────────────────────────
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
      - uses: docker/build-push-action@v5
        with:
          context:    .
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
